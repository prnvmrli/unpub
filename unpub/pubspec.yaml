name: unpub
description: Self-hosted private Dart Pub server for Enterprise, with a simple web interface to search and view packages information.
version: 2.0.1
homepage: https://github.com/bytedance/unpub
environment:
  sdk: "^3.11.4"
resolution: workspace
executables:
  unpub: unpub
dependencies:
  args: ^2.2.0
  shelf: ^1.2.0
  shelf_router: ^1.1.1
  http_parser: ^4.0.0
  http: ^1.6.0
  archive: ^4.0.9
  logging: ^1.0.1
  meta: ^1.1.7
  googleapis: ^16.0.0
  yaml: ^3.1.0
  pub_semver: ^2.0.0
  json_annotation: ^4.1.0
  mongo_dart: ^0.10.8
  mime: ^2.0.0
  intl: ^0.20.2
  path: ^1.6.2
  collection: ^1.15.0
  shelf_cors_headers: ^0.1.2
dev_dependencies:
  test: ^1.6.1
  build_runner: ^2.13.1
  json_serializable: ^6.13.1
  shelf_router_generator: ^1.0.1
  chunked_stream: ^1.4.1
